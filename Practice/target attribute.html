<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Target Attribute Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        iframe {
            width: 100%;
            height: 200px;
            border: 2px solid black;
        }
        a {
            display: block;
            margin: 10px 0;
            font-size: 18px;
        }
    </style>
</head>
<body>

<h1>HTML Target Attribute Demo</h1>

<h2>Links outside iframe</h2>
<a href="./home.html" target="_self">
    Open in SAME tab (_self)
</a>

<a href="./Contact.html" target="_blank">
    Open in NEW tab (_blank)
</a>

<hr>

<h2>Iframe below (important for _parent & _top)</h2>

<iframe srcdoc="
    <h3>Inside iframe</h3>

    <a href='./home.html' target='_self'>
        Open inside iframe (_self)
    </a>

    <a href='./home.html' target='_parent'>
        Open in parent page (_parent)
    </a>

    <a href='./Contact.html' target='_top'>
        Open full page (_top)
    </a>

    <a href='./Contact.html' target='_blank'>
        Open new tab (_blank)
    </a>
"></iframe>

</body>
</html>
